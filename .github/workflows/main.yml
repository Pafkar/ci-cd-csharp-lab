name: Build and Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore main project
      run: dotnet restore ConsoleApp1.csproj
    
    - name: Build main project
      run: dotnet build ConsoleApp1.csproj --no-restore
    
    - name: Restore test project
      run: dotnet restore CalculatorApp.Tests/CalculatorApp.Tests.csproj
    
    - name: Build test project
      run: dotnet build CalculatorApp.Tests/CalculatorApp.Tests.csproj --no-restore
    
    - name: Run tests
      run: dotnet test CalculatorApp.Tests/CalculatorApp.Tests.csproj --no-build --verbosity normal
